<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensory Mapping</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: 'Space Mono', 'Courier New', monospace; overflow: hidden; height: 100vh; }
  
  .app { margin: 0; padding: 1.5rem 2.5rem; height: 100vh; display: flex; flex-direction: column; }
  
  .header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 1.25rem; }
  .header h1 { font-size: 13px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: #555; }
  
  .toggle { display: flex; background: #0f0f0f; border-radius: 20px; padding: 2px; border: 1px solid #1a1a1a; }
  .toggle button {
    background: transparent; border: none; border-radius: 18px; padding: 5px 20px; cursor: pointer;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #333;
    font-family: 'Space Mono', 'Courier New', monospace; transition: all 0.2s;
  }
  .toggle button.active { background: #1a1a1a; color: #aaa; }
  
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #444; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; box-sizing: border-box; }
  
  .main { display: flex; flex: 1 1 0; min-height: 0; position: relative; justify-content: center; align-items: center; }
  .map-area { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: opacity 0.4s ease; }
  
  .detail-panel {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 280px; padding: 1.25rem;
    background: #0a0a0a;
    border-left: 1px solid #1a1a1a;
    overflow-y: auto; z-index: 20;
    animation: fadeIn 0.2s ease;
  }
  .detail-panel.empty {
    display: none;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  
  .detail-panel .cat-label { font-size: 9px; color: #444; letter-spacing: 0.15em; text-transform: uppercase; margin: 0 0 4px; }
  .detail-panel h2 { font-size: 14px; font-weight: 400; color: #e0e0e0; margin: 0; line-height: 1.4; font-family: 'Space Mono', 'Courier New', monospace; }
  .detail-panel .close-btn { background: transparent; border: none; color: #444; cursor: pointer; font-size: 16px; padding: 2px 4px; line-height: 1; font-family: 'Space Mono', monospace; }
  .detail-panel .icon-circle {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.25rem;
  }
  .detail-panel .desc { font-size: 12px; line-height: 1.7; color: #777; margin: 0 0 1rem; }
  .detail-panel .section-label { font-size: 9px; color: #555; letter-spacing: 0.15em; text-transform: uppercase; margin: 0 0 6px; }
  .detail-panel .examples { font-size: 11px; line-height: 1.65; color: #555; margin: 0 0 1.5rem; }
  
  .conn-btn {
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 8px; padding: 5px 0; text-align: left; width: 100%;
  }
  .conn-btn .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; box-sizing: border-box; }
  .conn-btn .name { font-size: 11px; color: #555; font-family: 'Space Mono', 'Courier New', monospace; }
  .conn-btn .arrow { font-size: 10px; color: #222; margin-left: auto; }
  
  .no-equiv { font-size: 11px; color: #333; font-style: italic; margin: 0; padding-top: 8px; border-top: 1px solid #111; }
  
  #map-svg { width: 100%; height: 100%; max-height: 100%; }
  #canvas-3d { width: 100%; height: 100%; display: block; cursor: grab; }
  
  .hover-label-3d {
    position: absolute; pointer-events: none;
    font: 11px 'Space Mono', 'Courier New', monospace; color: #aaa;
    background: rgba(5,5,5,0.92); padding: 3px 9px; border-radius: 4px;
    border: 1px solid #1a1a1a; opacity: 0; transition: opacity 0.12s;
    white-space: nowrap; z-index: 10;
  }
  
  @media (max-width: 768px) {
    body { overflow: auto; height: auto; }
    .app { height: auto; padding: 1rem; }
    .main { min-height: 500px; }
    .map-area { min-height: 350px; }
    .detail-panel { width: 100%; right: 0; left: 0; top: auto; bottom: 0; height: auto; max-height: 50vh; border-left: none; border-top: 1px solid #1a1a1a; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <h1>Sensory mapping</h1>
    </div>
    <div class="toggle">
      <button id="btn-2d" class="active" onclick="setMode('2d')">2d</button>
      <button id="btn-3d" onclick="setMode('3d')">3d</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#1D9E75;"></span>Natural</div>
    <div class="legend-item"><span class="legend-dot" style="background:#1D9E75; border:2px solid #9b8adb;"></span>Natural (human)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#D85A30;"></span>Machine</div>
  </div>

  <div class="main" id="main">
    <div class="map-area" id="map-area"></div>
    <div class="detail-panel empty" id="detail-panel"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

const sMap = new Map(S.map(s => [s.id, s]));

// ─── STATE ───────────────────────────────────────────────────────────
let currentMode = '2d';
let selectedId = null;
let hoveredId = null;

// ─── DETAIL PANEL ────────────────────────────────────────────────────
function renderDetail() {
  const panel = document.getElementById('detail-panel');
  if (!selectedId) { panel.classList.add('empty'); panel.innerHTML = ''; return; }
  panel.classList.remove('empty');
  const s = sMap.get(selectedId);
  const col = COLORS[s.c];
  const catLabel = s.c === 'human' ? 'natural (human)' : s.c === 'natural' ? 'natural' : 'machine';
  const sectionLabel = s.c === 'machine' ? 'Applications' : 'Found in';
  const iconSvg = ICONS[s.ic] || '';
  const borderCol = s.c === 'human' ? col.stroke + '44' : col.fill + '28';

  let connHtml = '';
  if (s.cn.length > 0) {
    connHtml = `<p class="section-label" style="margin-top:0;margin-bottom:8px">Connections</p><div style="display:flex;flex-direction:column;gap:1px">`;
    s.cn.forEach(cid => {
      const t = sMap.get(cid);
      if (!t) return;
      const tc = COLORS[t.c];
      const dotBorder = t.c === 'human' ? `border:1.5px solid ${COLORS.human.stroke};` : '';
      connHtml += `<button class="conn-btn" data-nav="${cid}"><span class="dot" style="background:${tc.fill};${dotBorder}"></span><span class="name">${t.n}</span><span class="arrow">→</span></button>`;
    });
    connHtml += '</div>';
  } else {
    connHtml = `<p class="no-equiv">No known equivalent — unique perceptual channel.</p>`;
  }

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
      <div>
        <p class="cat-label">${catLabel}</p>
        <h2>${s.n}</h2>
      </div>
      <button class="close-btn" id="close-detail">×</button>
    </div>
    <div class="icon-circle" style="background:${col.fill}15;border:1px solid ${borderCol}">
      <svg width="20" height="20" viewBox="0 0 24 24" style="color:${col.fill}">${iconSvg}</svg>
    </div>
    <p class="desc">${s.d}</p>
    <p class="section-label">${sectionLabel}</p>
    <p class="examples">${s.ex}</p>
    ${connHtml}
  `;

  document.getElementById('close-detail').onclick = () => { selectSense(null); };
  panel.querySelectorAll('.conn-btn').forEach(btn => {
    btn.onclick = () => selectSense(btn.dataset.nav);
  });
}

let lastSelectTime = 0;

function selectSense(id) {
  const now = Date.now();
  if (now - lastSelectTime < 150) return; // debounce rapid calls
  lastSelectTime = now;
  selectedId = (selectedId === id) ? null : id;
  renderDetail();
  if (currentMode === '2d') render2D();
}

function forceSelect(id) {
  const now = Date.now();
  if (now - lastSelectTime < 150) return;
  lastSelectTime = now;
  selectedId = id;
  renderDetail();
}

function forceDeselect() {
  const now = Date.now();
  if (now - lastSelectTime < 150) return;
  lastSelectTime = now;
  selectedId = null;
  renderDetail();
}

// ─── 2D VIEW ─────────────────────────────────────────────────────────
function render2D() {
  const area = document.getElementById('map-area');
  const mapW = 900, mapH = 750;
  const sel = selectedId ? sMap.get(selectedId) : null;
  const connSet = sel ? new Set(sel.cn) : new Set();

  const getPos = (s) => ({
    x: 60 + s.cu * (mapW - 120),
    y: 55 + s.di * (mapH - 110),
  });

  let svg = `<svg id="map-svg" viewBox="0 0 ${mapW} ${mapH}" style="width:100%;height:auto;display:block">`;
  svg += `<line x1="50" y1="${mapH/2}" x2="${mapW-50}" y2="${mapH/2}" stroke="#333" stroke-width="1"/>`;
  svg += `<line x1="${mapW/2}" y1="40" x2="${mapW/2}" y2="${mapH-40}" stroke="#333" stroke-width="1"/>`;
  svg += `<text x="50" y="${mapH/2-14}" fill="#777" font-size="13" font-family="'Space Mono','Courier New',monospace" text-anchor="start">latent</text>`;
  svg += `<text x="${mapW-50}" y="${mapH/2-14}" fill="#777" font-size="13" font-family="'Space Mono','Courier New',monospace" text-anchor="end">manifest</text>`;
  svg += `<text x="${mapW/2}" y="36" fill="#777" font-size="13" font-family="'Space Mono','Courier New',monospace" text-anchor="middle">distributed</text>`;
  svg += `<text x="${mapW/2}" y="${mapH-26}" fill="#777" font-size="13" font-family="'Space Mono','Courier New',monospace" text-anchor="middle">individual</text>`;

  if (sel) {
    S.filter(s => connSet.has(s.id)).forEach(t => {
      const f = getPos(sel), to = getPos(t);
      svg += `<line x1="${f.x}" y1="${f.y}" x2="${to.x}" y2="${to.y}" stroke="#444" stroke-width="0.7" stroke-dasharray="4,5"/>`;
    });
  }

  S.forEach(s => {
    const p = getPos(s);
    const isSel = s.id === selectedId;
    const isConn = connSet.has(s.id);
    const dimmed = selectedId && !isSel && !isConn;
    const col = COLORS[s.c];
    const r = isSel ? 10 : 7;
    const opacity = dimmed ? 0.1 : 0.85;
    const strokeAttr = s.c === 'human' ? `stroke="${COLORS.human.stroke}" stroke-width="2.5"` : '';

    svg += `<g data-id="${s.id}" style="cursor:pointer;opacity:${opacity}">`;
    if (isSel) svg += `<circle cx="${p.x}" cy="${p.y}" r="${r+7}" fill="${col.fill}" fill-opacity="0.15"/>`;
    svg += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${col.fill}" fill-opacity="0.85" ${strokeAttr}/>`;
    if (isSel) svg += `<text x="${p.x}" y="${p.y-r-9}" fill="#888" font-size="12" text-anchor="middle" font-family="'Space Mono','Courier New',monospace">${s.n}</text>`;
    svg += `</g>`;
  });

  svg += '</svg>';
  area.innerHTML = svg;

  // hover + click
  area.querySelectorAll('g[data-id]').forEach(g => {
    const id = g.dataset.id;
    g.addEventListener('mouseenter', () => {
      if (id === selectedId) return;
      const s = sMap.get(id);
      const circles = g.querySelectorAll('circle');
      const mainCircle = circles[circles.length - 1];
      const cx = mainCircle.getAttribute('cx'), cy = mainCircle.getAttribute('cy');
      // add hover label
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', cx);
      txt.setAttribute('y', parseFloat(cy) - 18);
      txt.setAttribute('fill', '#888');
      txt.setAttribute('font-size', '12');
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-family', "'Space Mono','Courier New',monospace");
      txt.setAttribute('class', 'hover-label');
      txt.textContent = s.n;
      g.appendChild(txt);
      mainCircle.setAttribute('r', '9');
    });
    g.addEventListener('mouseleave', () => {
      const hl = g.querySelector('.hover-label');
      if (hl) hl.remove();
      const circles = g.querySelectorAll('circle');
      const mainCircle = circles[circles.length - 1];
      if (id !== selectedId) mainCircle.setAttribute('r', '7');
    });
    g.addEventListener('click', () => selectSense(id));
  });
}

// ─── 3D VIEW ─────────────────────────────────────────────────────────
let threeCleanup = null;

function init3D() {
  const container = document.getElementById('map-area');
  container.innerHTML = '';

  const T = THREE;
  const w = container.clientWidth;
  const h = container.clientHeight || 480;

  const scene = new T.Scene();
  const cam = new T.PerspectiveCamera(30, w / h, 0.1, 200);
  const renderer = new T.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0a0a, 1);
  container.appendChild(renderer.domElement);

  // axes
  const AL = 2.2;
  const aM = new T.LineBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.5 });
  [[[-AL,0,0],[AL,0,0]],[[0,-AL,0],[0,AL,0]],[[0,0,-AL],[0,0,AL]]].forEach(([a,b]) => {
    scene.add(new T.Line(new T.BufferGeometry().setFromPoints([new T.Vector3(...a), new T.Vector3(...b)]), aM));
  });

  function mkLabel(text, pos) {
    const c = document.createElement('canvas');
    c.width = 320; c.height = 56;
    const ctx = c.getContext('2d');
    ctx.font = "20px 'Courier New', monospace";
    ctx.fillStyle = '#666';
    ctx.textAlign = 'center';
    ctx.fillText(text, 160, 34);
    const mat = new T.SpriteMaterial({ map: new T.CanvasTexture(c), transparent: true, depthTest: false, opacity: 0.6 });
    const sp = new T.Sprite(mat);
    sp.position.set(...pos);
    sp.scale.set(2.2, 0.4, 1);
    scene.add(sp);
  }

  mkLabel('latent', [-AL-0.5, 0, 0]);
  mkLabel('manifest', [AL+0.5, 0, 0]);
  mkLabel('distributed', [0, AL+0.25, 0]);
  mkLabel('individual', [0, -AL-0.3, 0]);
  mkLabel('proximal', [0, 0, -AL-0.4]);
  mkLabel('distal', [0, 0, AL+0.35]);

  const SC = 3.2;
  const visuals = [];   // small visible spheres
  const hitTargets = []; // larger invisible spheres for raycasting
  const idMap = new Map();
  const rings = [];

  S.forEach(s => {
    const sx = (s.cu - 0.5) * SC;
    const sy = (0.5 - s.di) * SC;
    const sz = (s.px - 0.5) * SC;

    // visible sphere
    const geo = new T.SphereGeometry(0.1, 16, 12);
    const mat = new T.MeshBasicMaterial({ color: COLORS[s.c].hex, transparent: true, opacity: 0.88 });
    const mesh = new T.Mesh(geo, mat);
    mesh.position.set(sx, sy, sz);
    mesh.userData = { id: s.id };
    scene.add(mesh);
    visuals.push(mesh);
    idMap.set(s.id, mesh);

    // invisible hit target — much larger
    const hitGeo = new T.SphereGeometry(0.28, 8, 6);
    const hitMat = new T.MeshBasicMaterial({ visible: false });
    const hitMesh = new T.Mesh(hitGeo, hitMat);
    hitMesh.position.copy(mesh.position);
    hitMesh.userData = { id: s.id };
    scene.add(hitMesh);
    hitTargets.push(hitMesh);

    if (s.c === 'human') {
      const rGeo = new T.RingGeometry(0.13, 0.17, 20);
      const rMat = new T.MeshBasicMaterial({ color: 0x9b8adb, side: T.DoubleSide, transparent: true, opacity: 0.5 });
      const ring = new T.Mesh(rGeo, rMat);
      ring.position.copy(mesh.position);
      scene.add(ring);
      rings.push(ring);
      mesh.userData.ring = ring;
    }
  });

  const connGroup = new T.Group();
  scene.add(connGroup);

  // hover label
  const hLabel = document.createElement('div');
  hLabel.className = 'hover-label-3d';
  container.style.position = 'relative';
  container.appendChild(hLabel);

  // camera orbit
  let theta = Math.PI * 0.28, phi = Math.PI * 0.3, radius = 11;
  let dragging = false, downXY = {x:0,y:0}, prevXY = {x:0,y:0};

  function updateCam() {
    cam.position.set(
      radius * Math.sin(phi) * Math.sin(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.cos(theta)
    );
    cam.lookAt(0,0,0);
  }
  updateCam();

  const cv = renderer.domElement;

  function rayHit(cx, cy) {
    const rect = cv.getBoundingClientRect();
    const mx = ((cx - rect.left) / rect.width) * 2 - 1;
    const my = -((cy - rect.top) / rect.height) * 2 + 1;
    const rc = new T.Raycaster();
    rc.setFromCamera(new T.Vector2(mx, my), cam);
    return rc.intersectObjects(hitTargets);
  }

  cv.addEventListener('mousedown', e => {
    dragging = true;
    downXY = {x:e.clientX, y:e.clientY};
    prevXY = {...downXY};
    cv.style.cursor = 'grabbing';
  });

  cv.addEventListener('mousemove', e => {
    if (dragging) {
      theta -= (e.clientX - prevXY.x) * 0.007;
      phi = Math.max(0.15, Math.min(Math.PI - 0.15, phi + (e.clientY - prevXY.y) * 0.007));
      prevXY = {x:e.clientX, y:e.clientY};
      updateCam();
      hLabel.style.opacity = '0';
    } else {
      const hits = rayHit(e.clientX, e.clientY);
      if (hits.length) {
        const s = sMap.get(hits[0].object.userData.id);
        if (s) {
          const rect = cv.getBoundingClientRect();
          hLabel.textContent = s.n;
          hLabel.style.left = (e.clientX - rect.left + 14) + 'px';
          hLabel.style.top = (e.clientY - rect.top - 10) + 'px';
          hLabel.style.opacity = '1';
          cv.style.cursor = 'pointer';
        }
      } else {
        hLabel.style.opacity = '0';
        cv.style.cursor = 'grab';
      }
    }
  });

  cv.addEventListener('mouseup', e => {
    const dist = Math.hypot(e.clientX - downXY.x, e.clientY - downXY.y);
    dragging = false;
    cv.style.cursor = 'grab';
    if (dist < 6) {
      const hits = rayHit(e.clientX, e.clientY);
      if (hits.length) {
        const hitId = hits[0].object.userData.id;
        if (selectedId === hitId) forceDeselect();
        else forceSelect(hitId);
      } else {
        forceDeselect();
      }
    }
  });

  cv.addEventListener('mouseleave', () => { dragging = false; cv.style.cursor = 'grab'; hLabel.style.opacity = '0'; });

  cv.addEventListener('wheel', e => {
    e.preventDefault();
    radius = Math.max(6, Math.min(20, radius + e.deltaY * 0.005));
    updateCam();
  }, {passive: false});

  // touch
  let td0 = 0;
  cv.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { dragging = true; downXY = {x:e.touches[0].clientX, y:e.touches[0].clientY}; prevXY = {...downXY}; }
    else if (e.touches.length === 2) { dragging = false; td0 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
  }, {passive:true});
  cv.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && dragging) {
      const p = e.touches[0];
      theta -= (p.clientX - prevXY.x) * 0.007;
      phi = Math.max(0.15, Math.min(Math.PI-0.15, phi + (p.clientY - prevXY.y) * 0.007));
      prevXY = {x:p.clientX, y:p.clientY};
      updateCam();
    } else if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      radius = Math.max(6, Math.min(20, radius - (d-td0)*0.015));
      td0 = d; updateCam();
    }
  }, {passive:true});
  cv.addEventListener('touchend', e => {
    const ct = e.changedTouches[0];
    const dist = Math.hypot(ct.clientX - downXY.x, ct.clientY - downXY.y);
    dragging = false;
    if (dist < 12) {
      const hits = rayHit(ct.clientX, ct.clientY);
      if (hits.length) {
        const hitId = hits[0].object.userData.id;
        if (selectedId === hitId) forceDeselect();
        else forceSelect(hitId);
      } else {
        forceDeselect();
      }
    }
  });

  const connMat = new T.LineDashedMaterial({ color: 0x555555, transparent: true, opacity: 0.6, dashSize: 0.12, gapSize: 0.08 });
  let animId;

  function animate() {
    animId = requestAnimationFrame(animate);
    
    // subtle auto-rotation when not dragging
    if (!dragging) {
      theta += 0.0008;
      updateCam();
    }
    
    rings.forEach(r => r.lookAt(cam.position));

    while (connGroup.children.length) connGroup.remove(connGroup.children[0]);

    if (selectedId) {
      const selData = sMap.get(selectedId);
      const selMesh = idMap.get(selectedId);
      if (selData && selMesh) {
        const connSet = new Set(selData.cn);
        visuals.forEach(m => {
          const isS = m.userData.id === selectedId;
          const isC = connSet.has(m.userData.id);
          m.material.opacity = (isS || isC) ? 0.92 : 0.06;
          m.scale.setScalar(isS ? 1.8 : isC ? 1.3 : 1);
          if (m.userData.ring) m.userData.ring.material.opacity = (isS || isC) ? 0.5 : 0.04;
        });
        selData.cn.forEach(cid => {
          const t = idMap.get(cid);
          if (t) { const g = new T.BufferGeometry().setFromPoints([selMesh.position, t.position]); const ln = new T.Line(g, connMat); ln.computeLineDistances(); connGroup.add(ln); }
        });
      }
    } else {
      visuals.forEach(m => { m.material.opacity = 0.88; m.scale.setScalar(1); if (m.userData.ring) m.userData.ring.material.opacity = 0.5; });
    }

    renderer.render(scene, cam);
  }
  animate();

  const onResize = () => {
    const nw = container.clientWidth;
    const nh = container.clientHeight || 480;
    cam.aspect = nw / nh;
    cam.updateProjectionMatrix();
    renderer.setSize(nw, nh);
  };
  window.addEventListener('resize', onResize);

  threeCleanup = () => {
    cancelAnimationFrame(animId);
    window.removeEventListener('resize', onResize);
    renderer.dispose();
  };
}

// ─── MODE SWITCHING ──────────────────────────────────────────────────
function setMode(mode) {
  if (mode === currentMode) return;
  selectedId = null;
  renderDetail();

  const mapArea = document.getElementById('map-area');
  
  // fade out
  mapArea.style.opacity = '0';
  
  document.getElementById('btn-2d').classList.toggle('active', mode === '2d');
  document.getElementById('btn-3d').classList.toggle('active', mode === '3d');

  setTimeout(() => {
    if (threeCleanup) { threeCleanup(); threeCleanup = null; }
    currentMode = mode;
    
    if (mode === '2d') render2D();
    else init3D();
    
    // fade in
    requestAnimationFrame(() => { mapArea.style.opacity = '1'; });
  }, 350);
}

// ─── INIT ────────────────────────────────────────────────────────────
render2D();
</script>
</body>
